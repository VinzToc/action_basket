<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EPS — Compteur d'Actions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00e676;
    --green-dark: #00a152;
    --green-glow: rgba(0,230,118,0.35);
    --red: #ff1744;
    --red-dark: #b2102f;
    --red-glow: rgba(255,23,68,0.35);
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    letter-spacing: 3px;
    color: var(--text);
  }

  header .badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px;
    min-height: 0;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px;
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
    position: relative;
  }

  .card.plus { border-color: rgba(0,230,118,0.2); }
  .card.minus { border-color: rgba(255,23,68,0.2); }

  .card.flash-plus { animation: flashPlus 0.25s ease; }
  .card.flash-minus { animation: flashMinus 0.25s ease; }

  @keyframes flashPlus {
    0%   { box-shadow: 0 0 0px var(--green-glow); }
    50%  { box-shadow: 0 0 40px var(--green-glow); }
    100% { box-shadow: 0 0 0px var(--green-glow); }
  }
  @keyframes flashMinus {
    0%   { box-shadow: 0 0 0px var(--red-glow); }
    50%  { box-shadow: 0 0 40px var(--red-glow); }
    100% { box-shadow: 0 0 0px var(--red-glow); }
  }

  .card-label {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    text-transform: uppercase;
  }
  .card.plus .card-label { color: var(--green); }
  .card.minus .card-label { color: var(--red); }

  .counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 15vw, 10rem);
    line-height: 1;
    transition: transform 0.1s;
  }
  .card.plus .counter { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }
  .card.minus .counter { color: var(--red); text-shadow: 0 0 30px var(--red-glow); }

  .counter.bump { animation: bump 0.15s ease; }
  @keyframes bump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .action-btn {
    width: 100%;
    max-width: 240px;
    padding: 18px 0;
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  .action-btn:active { transform: scale(0.95); filter: brightness(0.85); }

  .btn-plus {
    background: var(--green);
    color: #000;
    box-shadow: 0 4px 20px var(--green-glow);
  }
  .btn-minus {
    background: var(--red);
    color: #fff;
    box-shadow: 0 4px 20px var(--red-glow);
  }

  footer {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  .footer-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    border-radius: 10px;
    font-family: 'Barlow', sans-serif;
    font-size: clamp(0.8rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
  }
  .footer-btn:active { transform: scale(0.97); filter: brightness(0.85); }

  .btn-reset {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid #333;
  }
  .btn-stats {
    background: #1a2a3a;
    color: #4fc3f7;
    border: 1px solid #1e4060;
  }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.2s;
    border: 1px solid #2a2a2a;
  }
  .overlay.visible .modal { transform: scale(1); }

  .modal-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .modal-text { color: #aaa; font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }

  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    font-family: 'Barlow', sans-serif; font-weight: 700;
    font-size: 0.95rem; cursor: pointer; transition: filter 0.1s;
  }
  .modal-actions button:active { filter: brightness(0.85); }
  .btn-confirm-reset { background: var(--red); color: #fff; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid #333; }

  /* STATS MODAL */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }
  .stat-box {
    padding: 16px 12px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .stat-box.green { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); }
  .stat-box.red   { background: rgba(255,23,68,0.08);  border: 1px solid rgba(255,23,68,0.2); }
  .stat-box.blue  { background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.2); }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
  }
  .stat-box.green .stat-val { color: var(--green); }
  .stat-box.red   .stat-val { color: var(--red); }
  .stat-box.blue  .stat-val { color: #4fc3f7; }

  .stat-lbl { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  .ratio-box {
    background: var(--surface2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #2a2a2a;
  }
  .ratio-label { font-size: 0.75rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .ratio-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #4fc3f7;
    text-shadow: 0 0 20px rgba(79,195,247,0.4);
    line-height: 1;
  }
  .ratio-note { font-size: 0.78rem; color: var(--muted); margin-top: 6px; line-height: 1.4; }

  .progress-bar-wrap { margin-bottom: 10px; }
  .progress-bar-track {
    height: 8px; border-radius: 99px;
    background: var(--surface2);
    overflow: hidden;
    display: flex;
  }
  .progress-bar-fill-plus { background: var(--green); transition: width 0.4s ease; }
  .progress-bar-fill-minus { background: var(--red); transition: width 0.4s ease; }
  .progress-bar-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.7rem; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚡ EPS — Actions</h1>
  </div>
  <div class="badge">Compteur de match</div>
</header>

<div class="main">
  <!-- CARD + -->
  <div class="card plus" id="cardPlus">
    <div class="card-label">✅ Actions +</div>
    <div class="counter" id="counterPlus">0</div>
    <button class="action-btn btn-plus" onclick="increment('plus')">+ ACTION</button>
  </div>

  <!-- CARD - -->
  <div class="card minus" id="cardMinus">
    <div class="card-label">❌ Actions −</div>
    <div class="counter" id="counterMinus">0</div>
    <button class="action-btn btn-minus" onclick="increment('minus')">− ACTION</button>
  </div>
</div>

<footer>
  <button class="footer-btn btn-reset" onclick="askReset()">🔄 Remettre à zéro</button>
  <button class="footer-btn btn-stats" onclick="showStats()">📊 Statistiques</button>
</footer>

<!-- MODAL RESET -->
<div class="overlay" id="overlayReset">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">Remise à zéro</div>
    <div class="modal-text">Les compteurs <strong>Actions +</strong> et <strong>Actions −</strong> seront réinitialisés à 0.<br>Cette action est irréversible.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('overlayReset')">Annuler</button>
      <button class="btn-confirm-reset" onclick="confirmReset()">Confirmer</button>
    </div>
  </div>
</div>

<!-- MODAL STATS -->
<div class="overlay" id="overlayStats">
  <div class="modal">
    <div class="modal-icon">📊</div>
    <div class="modal-title">Statistiques</div>

    <div class="stats-grid">
      <div class="stat-box green">
        <div class="stat-val" id="statPlus">0</div>
        <div class="stat-lbl">Actions +</div>
      </div>
      <div class="stat-box red">
        <div class="stat-val" id="statMinus">0</div>
        <div class="stat-lbl">Actions −</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill-plus" id="barPlus" style="width:50%"></div>
        <div class="progress-bar-fill-minus" id="barMinus" style="width:50%"></div>
      </div>
      <div class="progress-bar-labels">
        <span id="pctPlus">—</span>
        <span id="pctMinus">—</span>
      </div>
    </div>

    <div class="ratio-box">
      <div class="ratio-label">Ratio (Actions + / Actions −)</div>
      <div class="ratio-value" id="statRatio">—</div>
      <div class="ratio-note" id="ratioNote">Aucune donnée disponible.</div>
    </div>

    <div class="modal-actions">
      <button class="btn-stats" style="background:#1a2a3a;color:#4fc3f7;border:1px solid #1e4060;" onclick="closeModal('overlayStats')">Fermer</button>
    </div>
  </div>
</div>

<script>
  let counts = { plus: 0, minus: 0 };

  function increment(type) {
    counts[type]++;
    const el = document.getElementById(type === 'plus' ? 'counterPlus' : 'counterMinus');
    const card = document.getElementById(type === 'plus' ? 'cardPlus' : 'cardMinus');

    el.textContent = counts[type];

    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');

    card.classList.remove('flash-plus', 'flash-minus');
    void card.offsetWidth;
    card.classList.add(type === 'plus' ? 'flash-plus' : 'flash-minus');
  }

  function askReset() {
    document.getElementById('overlayReset').classList.add('visible');
  }

  function confirmReset() {
    counts = { plus: 0, minus: 0 };
    document.getElementById('counterPlus').textContent = '0';
    document.getElementById('counterMinus').textContent = '0';
    closeModal('overlayReset');
  }

  function showStats() {
    const p = counts.plus;
    const m = counts.minus;
    const total = p + m;

    document.getElementById('statPlus').textContent = p;
    document.getElementById('statMinus').textContent = m;

    // Ratio
    const ratioEl = document.getElementById('statRatio');
    const noteEl = document.getElementById('ratioNote');
    if (m === 0) {
      ratioEl.textContent = p === 0 ? '—' : '∞';
      noteEl.textContent = m === 0 && p === 0
        ? 'Aucune donnée disponible.'
        : 'Aucune action négative enregistrée.';
    } else {
      const ratio = (p / m).toFixed(2);
      ratioEl.textContent = ratio;
      if (ratio >= 2)      noteEl.textContent = '🟢 Excellent ratio — très bonnes actions positives.';
      else if (ratio >= 1) noteEl.textContent = '🟡 Ratio correct — plus d\'actions positives que négatives.';
      else                 noteEl.textContent = '🔴 Ratio défavorable — plus d\'actions négatives que positives.';
    }

    // Progress bar
    if (total > 0) {
      const pPct = Math.round((p / total) * 100);
      const mPct = 100 - pPct;
      document.getElementById('barPlus').style.width = pPct + '%';
      document.getElementById('barMinus').style.width = mPct + '%';
      document.getElementById('pctPlus').textContent = `✅ ${pPct}%`;
      document.getElementById('pctMinus').textContent = `❌ ${mPct}%`;
    } else {
      document.getElementById('barPlus').style.width = '50%';
      document.getElementById('barMinus').style.width = '50%';
      document.getElementById('pctPlus').textContent = '—';
      document.getElementById('pctMinus').textContent = '—';
    }

    document.getElementById('overlayStats').classList.add('visible');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('visible');
  }

  // Fermer en cliquant sur le fond
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => {
      if (e.target === o) o.classList.remove('visible');
    });
  });
</script>
</body>
</html>
